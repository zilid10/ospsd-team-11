version: 2.1

jobs:
  build:
    docker:
        - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: "Install UV and Add to Path"
          command: |
            # set -eo pipefail is not needed since it's CircleCI's default setting
            curl -LsSf https://astral.sh/uv/install.sh | sh 
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version
      - run:
          name: "Create Virtual Env & Install All Dependencies via UV Sync"
          command: |
            uv venv --python 3.13
            source .venv/bin/activate
            uv sync --all-packages --extra dev --verbose
      - run:
          name: "Verify Installation"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            pytest --version
            mypy --version
            coverage --version
      - persist_to_workspace:
          root: .
          paths:
            - .
  lint:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run lint
          command: |
            source .venv/bin/activate
            ruff check .

  types:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run mypy type checking
          command: |
            source .venv/bin/activate
            mypy .

  unit_tests:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run unit tests per component
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit
            pytest components \
              -m "not local_credentials" -v \
              --junitxml test-results/unit/results.xml \
              --cov=components \
              --cov-report=term \
              --cov-report=xml:coverage.xml \
              --cov-report=html:htmlcov
      - persist_to_workspace:
          root: .
          paths:
            - test-results/unit
            - coverage.xml
            - htmlcov
      - store_test_results:
          path: test-results/unit
      - store_artifacts:
          path: test-results/unit
      - store_artifacts:
          path: htmlcov
          destination: coverage-report
      - store_artifacts:
          path: coverage.xml

  integration_tests:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run integration tests
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration
            pytest tests/integration \
              -m "not local_credentials" -v \
              --junitxml test-results/integration/results.xml \
              --no-cov
      - persist_to_workspace:
          root: .
          paths:
            - test-results/integration
      - store_test_results:
          path: test-results/integration
      - store_artifacts:
          path: test-results/integration

  e2e_tests:
    docker:
      - image: cimg/python:3.13
    working_directory: ~/repo
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run E2E tests
          command: |
            source .venv/bin/activate
            mkdir -p test-results/e2e
            pytest tests/e2e \
              -m "not local_credentials" -v \
              --junitxml test-results/e2e/results.xml \
              --no-cov
      - persist_to_workspace:
          root: .
          paths:
            - test-results/e2e
      - store_test_results:
          path: test-results/e2e
      - store_artifacts:
          path: test-results/e2e

  report_summary:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Install xmllint"
          command: |
            sudo apt-get update
            sudo apt-get install -y libxml2-utils
      - run:
          name: "Summarize Unit Test Results"
          command: |
            echo "--- Unit Test Summary ---"
            if [ -f test-results/unit/results.xml ]; then
              echo "Unit test results file found."
              if command -v xmllint > /dev/null; then
                tests=$(xmllint --xpath "string(//testsuite/@tests)" test-results/unit/results.xml 2>/dev/null || echo "N/A")
                failures=$(xmllint --xpath "string(//testsuite/@failures)" test-results/unit/results.xml 2>/dev/null || echo "N/A")
                echo "Tests: $tests, Failures: $failures"
              fi
            else
              echo "Unit test results file (test-results/unit/results.xml) not found."
            fi
      - run:
          name: "Summarize Integration Test Results"
          command: |
            echo "--- Integration Test Summary ---"
            if [ -f test-results/integration/results.xml ]; then
              echo "Integration test results file found."
            else
              echo "Integration test results file not found."
            fi
      - run:
          name: "Summarize E2E Test Results"
          command: |
            echo "--- E2E Test Summary ---"
            if [ -f test-results/e2e/results.xml ]; then
              echo "E2E test results file found."
            else
              echo "E2E test results file not found."
            fi
      - run:
          name: "Display Coverage Info"
          command: |
            echo "--- Coverage Summary ---"
            if [ -f coverage.xml ]; then
               echo "Coverage XML found. Check artifacts for details."
               if command -v xmllint > /dev/null; then
                 coverage_rate=$(xmllint --xpath "string(//coverage/@line-rate)" coverage.xml 2>/dev/null || echo "N/A")
                 echo "Line Coverage Rate: $coverage_rate"
               fi
            else
               echo "Coverage XML not found."
            fi

workflows:
  lint_types_tests:
    jobs:
      - build
      - lint:
          requires:
            - build
      - types:
          requires:
            - build
      - unit_tests:
          requires:
            - build
      - integration_tests:
          requires:
            - unit_tests
      - e2e_tests:
          requires:
            - integration_tests
      - report_summary:
          requires:
            - unit_tests
            - integration_tests
            - e2e_tests
