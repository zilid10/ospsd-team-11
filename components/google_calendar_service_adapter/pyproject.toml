[project]
name = "google-calendar-service-adapter"
version = "0.1.0"
description = "Adapter that implements CalendarClient API over HTTP using the auto-generated service client"
requires-python = ">=3.13"
dependencies = [
    "calendar-client-api",
    "google-calendar-service-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/google_calendar_service_adapter"]
